<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakhani Foods CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#143f2c">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#f6f4ee; --panel:#ffffff; --ink:#1e2a23; --muted:#6b7a70;
    --green:#1e5c40; --green-dark:#143f2c; --green-soft:#e4efe8;
    --amber:#d98324; --amber-soft:#fbeedb;
    --red:#b03a2e; --red-soft:#f7e2df;
    --blue:#2b6cb0; --blue-soft:#e2ecf7;
    --border:#e2ded2; --shadow:0 2px 10px rgba(30,42,35,.07);
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--ink);font-size:15px}
  .sans{font-family:'Segoe UI',system-ui,sans-serif}
  button,input,select,textarea{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .hidden{display:none!important}

  /* ---------- Lock screen ---------- */
  #lockScreen{position:fixed;inset:0;background:linear-gradient(160deg,#143f2c 0%,#1e5c40 60%,#2a7350 100%);display:flex;align-items:center;justify-content:center;z-index:100}
  .lock-card{background:var(--panel);border-radius:16px;padding:42px 46px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  .lock-card h1{font-size:26px;margin-bottom:4px;color:var(--green-dark)}
  .lock-card .sub{color:var(--muted);margin-bottom:26px;font-style:italic}
  .lock-card input[type=password]{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
  .lock-err{color:var(--red);font-size:13px;margin-bottom:10px;min-height:16px}
  .remember-row{display:flex;align-items:center;gap:8px;justify-content:center;margin:6px 0 16px;font-size:13px;color:var(--muted);font-family:'Segoe UI',sans-serif}

  /* ---------- Layout ---------- */
  #app{display:flex;min-height:100vh}
  aside{width:225px;background:var(--green-dark);color:#e9f2ec;padding:26px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0}
  .logo{padding:0 24px 22px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:16px}
  .logo .name{font-size:19px;font-weight:bold;letter-spacing:.3px}
  .logo .tag{font-size:11.5px;color:#9fc0ac;font-style:italic;margin-top:3px}
  .nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:#c6dccd;padding:11px 24px;cursor:pointer;font-size:14.5px;border-left:3px solid transparent}
  .nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-btn.active{background:rgba(255,255,255,.10);color:#fff;border-left-color:var(--amber)}
  .nav-btn .ico{width:20px;text-align:center}
  .side-bottom{margin-top:auto;padding:14px 24px 0;border-top:1px solid rgba(255,255,255,.12)}
  main{flex:1;margin-left:225px;padding:30px 38px 60px}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:14px;flex-wrap:wrap}
  .page-head h2{font-size:24px;color:var(--green-dark)}
  .page-head .sub{color:var(--muted);font-size:13.5px;margin-top:3px;font-style:italic}

  /* ---------- Components ---------- */
  .btn{background:var(--green);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600}
  .btn:hover{background:var(--green-dark)}
  .btn.amber{background:var(--amber)} .btn.amber:hover{background:#b96c1a}
  .btn.ghost{background:transparent;color:var(--green);border:1px solid var(--green)}
  .btn.ghost:hover{background:var(--green-soft)}
  .btn.danger{background:var(--red)} .btn.danger:hover{background:#8e2e24}
  .btn.small{padding:5px 11px;font-size:12.5px}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .kpi .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-family:'Segoe UI',sans-serif}
  .kpi .val{font-size:26px;font-weight:bold;color:var(--green-dark);margin-top:6px}
  .kpi .note{font-size:12px;color:var(--muted);margin-top:4px;font-family:'Segoe UI',sans-serif}
  table{width:100%;border-collapse:collapse;font-family:'Segoe UI',sans-serif;font-size:13.5px}
  th{text-align:left;padding:9px 12px;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)}
  td{padding:10px 12px;border-bottom:1px solid #efece3;vertical-align:middle}
  tr.clickable{cursor:pointer} tr.clickable:hover{background:#faf8f2}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;font-family:'Segoe UI',sans-serif}
  .pill.green{background:var(--green-soft);color:var(--green-dark)}
  .pill.amber{background:var(--amber-soft);color:#8a5313}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.blue{background:var(--blue-soft);color:var(--blue)}
  .pill.grey{background:#eceae2;color:#666}
  .search{padding:9px 13px;border:1px solid var(--border);border-radius:8px;width:250px;background:#fff}
  .empty{padding:44px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:10px}
  a.lnk{color:var(--green);cursor:pointer;text-decoration:underline}

  /* ---------- Pipeline ---------- */
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;align-items:start}
  .col{background:#efece3;border-radius:var(--radius);padding:12px;min-height:340px}
  .col.drag-over{outline:2px dashed var(--green);outline-offset:-3px;background:var(--green-soft)}
  .col-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .col-head .t{font-weight:bold;font-size:13.5px;color:var(--green-dark);font-family:'Segoe UI',sans-serif}
  .col-head .n{font-size:12px;color:var(--muted);font-family:'Segoe UI',sans-serif}
  .col-sum{font-size:11.5px;color:var(--muted);margin-bottom:10px;font-family:'Segoe UI',sans-serif}
  .deal{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 12px;margin-bottom:9px;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.05);font-family:'Segoe UI',sans-serif}
  .deal:active{cursor:grabbing}
  .deal .dn{font-weight:600;font-size:13.5px;margin-bottom:3px}
  .deal .dc{font-size:12px;color:var(--muted)}
  .deal .dv{font-size:13px;color:var(--green-dark);font-weight:700;margin-top:6px}
  .deal .tags{margin-top:6px}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(20,35,26,.45);display:flex;align-items:flex-start;justify-content:center;z-index:60;padding:6vh 16px;overflow-y:auto}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;padding:26px 28px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
  .modal.wide{max-width:720px}
  .modal h3{color:var(--green-dark);font-size:19px;margin-bottom:16px}
  .frow{margin-bottom:13px}
  .frow label{display:block;font-size:12.5px;font-weight:600;color:#4a5a50;margin-bottom:5px;font-family:'Segoe UI',sans-serif}
  .frow input,.frow select,.frow textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .frow textarea{resize:vertical;min-height:70px}
  .frow .hint{font-size:11.5px;color:var(--muted);margin-top:4px;font-family:'Segoe UI',sans-serif}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

  /* ---------- Detail drawer / profile ---------- */
  .profile-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .avatar{width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;font-family:'Segoe UI',sans-serif;flex-shrink:0}
  .avatar.sq{border-radius:12px;background:var(--amber)}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:7px 14px;font-family:'Segoe UI',sans-serif;font-size:13.5px}
  .kv .k{color:var(--muted)}
  .section-title{font-size:15px;color:var(--green-dark);margin:0 0 12px;font-weight:bold}
  .note-item{border-left:3px solid var(--green-soft);padding:6px 12px;margin-bottom:10px;font-family:'Segoe UI',sans-serif;font-size:13px}
  .note-item .when{color:var(--muted);font-size:11px}

  /* ---------- Charts ---------- */
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:1100px){.chart-grid{grid-template-columns:1fr}.board{grid-template-columns:repeat(2,1fr)}}
  .chart-title{font-size:13px;font-weight:600;color:#4a5a50;margin-bottom:12px;font-family:'Segoe UI',sans-serif;text-transform:uppercase;letter-spacing:.6px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-family:'Segoe UI',sans-serif;font-size:12px;color:var(--muted)}
  .legend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px}

  /* ---------- Invoice printing ---------- */
  @media print{
    body.print-inv > *{ display:none !important; }
    body.print-inv #modalRoot{ display:block !important; }
    body.print-inv #modalRoot .modal-bg{ position:static; padding:0; background:#fff; display:block; overflow:visible; }
    body.print-inv #modalRoot .modal{ box-shadow:none; max-width:100%; padding:0; }
    body.print-inv #modalRoot .modal > *:not(#invoicePrintArea){ display:none !important; }
    body.print-inv #invoicePrintArea{ border:none !important; }
  }

  /* ---------- Toast ---------- */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:11px 22px;border-radius:9px;font-family:'Segoe UI',sans-serif;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s;z-index:200}
  #toast.show{opacity:1}
  #toast.err{background:var(--red)}
  .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ai-lead-row{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:9px;font-family:'Segoe UI',sans-serif}
  .ai-lead-row input[type=checkbox]{margin-top:4px;width:auto}
  .banner{background:var(--amber-soft);border:1px solid #edd7b4;color:#7a4d13;border-radius:9px;padding:10px 15px;font-size:12.5px;font-family:'Segoe UI',sans-serif;margin-bottom:15px}
</style>
</head>
<body>

<div id="lockScreen" class="hidden"></div>

<div id="app" class="hidden">
  <aside>
    <div class="logo">
      <div class="name" id="sideCompanyName">Lakhani Foods Ltd</div>
      <div class="tag">Customer Relationship Manager</div>
    </div>
    <button class="nav-btn" data-view="dashboard" onclick="App.go('dashboard')"><span class="ico">&#128200;</span> Analytics</button>
    <button class="nav-btn" data-view="pipeline"  onclick="App.go('pipeline')"><span class="ico">&#128736;</span> Lead Pipeline</button>
    <button class="nav-btn" data-view="contacts"  onclick="App.go('contacts')"><span class="ico">&#128100;</span> Contacts</button>
    <button class="nav-btn" data-view="companies" onclick="App.go('companies')"><span class="ico">&#127970;</span> Companies</button>
    <button class="nav-btn" data-view="stock"     onclick="App.go('stock')"><span class="ico">&#128230;</span> Stock</button>
    <button class="nav-btn" data-view="orders"    onclick="App.go('orders')"><span class="ico">&#128203;</span> Orders</button>
    <button class="nav-btn" data-view="invoices"  onclick="App.go('invoices')"><span class="ico">&#129534;</span> Invoices</button>
    <button class="nav-btn" data-view="banking"   onclick="App.go('banking')"><span class="ico">&#127974;</span> Banking</button>
    <button class="nav-btn" data-view="settings"  onclick="App.go('settings')"><span class="ico">&#9881;&#65039;</span> Settings</button>
    <div class="side-bottom">
      <button class="nav-btn" id="syncbtn" onclick="doSync()" style="padding-left:0"><span class="ico">&#10227;</span> Sync now</button>
      <div id="syncstatus" style="font-size:11px;color:#9fc0ac;padding:2px 0 8px 31px;font-family:'Segoe UI',sans-serif"></div>
      <button class="nav-btn" onclick="App.lock()" style="padding-left:0"><span class="ico">&#128274;</span> Lock</button>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
'use strict';
/* =====================================================================
   Lakhani Foods Ltd — CRM
   Single-file app. All data stored locally in this browser (localStorage).
   ===================================================================== */

const STAGES = ['New Lead','Contacted','Sample Sent','Negotiation','Closed Won'];
const STAGE_PROB = {'New Lead':0.10,'Contacted':0.25,'Sample Sent':0.45,'Negotiation':0.70,'Closed Won':1.0};
const DATA_KEY = 'lfcrm_data', AUTH_KEY = 'lfcrm_auth', REMEMBER_KEY = 'lfcrm_remember', SESSION_KEY = 'lfcrm_session';
const SYNC_TOKEN_KEY = 'lfcrm_sync_token', LAST_SYNC_KEY = 'lfcrm_last_sync', DEVICE_KEY = 'lfcrm_device_id';
const DATA_API = 'https://api.github.com/repos/rl1311/lakhani-foods-data/contents/';
const VAPID_PUBLIC = 'BFQ01jvwMThpXvuEY7rYqOt2DiyBh00c5Usp6XXMYZYYydSdrYfJQK35jR6GhSe7k5dL7ns92QtvroL712V84JI';

/* ---------------- storage ---------------- */
function freshData(){
  return {
    contacts:[], companies:[], deals:[], orders:[], invoices:[],
    stock:{items:[], incoming:[]},
    bank:{connected:false, bankName:'', balance:0, transactions:[], updatedAt:0},
    counters:{invoice:0},
    push:[], deleted:[], settingsUpdatedAt:0,
    settings:{companyName:'Lakhani Foods Ltd', currency:'£', apiKey:'',
      invoice:{businessName:'', address:'', email:'', phone:'', vatNo:'', termsDays:30, bankDetails:'', footer:'Thank you for your business.'}}
  };
}
let store = loadStore();
function loadStore(){
  try{
    const raw = localStorage.getItem(DATA_KEY);
    if(!raw) return freshData();
    const d = JSON.parse(raw);
    const f = freshData();
    return {...f, ...d, bank:{...f.bank, ...(d.bank||{})}, stock:{...f.stock, ...(d.stock||{})},
      counters:{...f.counters, ...(d.counters||{})},
      settings:{...f.settings, ...(d.settings||{}), invoice:{...f.settings.invoice, ...((d.settings||{}).invoice||{})}}};
  }catch(e){ return freshData(); }
}
/* Change-stamping: every save diffs each record against the last snapshot and
   stamps updatedAt on anything that changed — that's what drives newest-wins sync. */
let _prevSnap = null;
function _snapOf(x){ const c = {...x}; delete c.updatedAt; return JSON.stringify(c); }
function _collections(){
  return {ct:store.contacts, co:store.companies, dl:store.deals, or:store.orders,
    iv:store.invoices, si:store.stock.items, sn:store.stock.incoming, pu:store.push||[]};
}
function primeSnapshots(){
  _prevSnap = {};
  for(const [n, arr] of Object.entries(_collections()))
    (arr||[]).forEach(x=>{ if(x.id) _prevSnap[n+':'+x.id] = _snapOf(x); });
  _prevSnap['bank'] = JSON.stringify({c:store.bank.connected, n:store.bank.bankName, b:store.bank.balance});
  _prevSnap['set']  = JSON.stringify({n:store.settings.companyName, c:store.settings.currency, i:store.settings.invoice});
}
function stampChanges(){
  if(_prevSnap === null){ primeSnapshots(); return; }
  const now = Date.now();
  for(const [n, arr] of Object.entries(_collections())){
    (arr||[]).forEach(x=>{
      if(!x.id) return;
      const k = n+':'+x.id, s = _snapOf(x);
      if(_prevSnap[k] !== s){ x.updatedAt = now; _prevSnap[k] = s; }
    });
  }
  const bs = JSON.stringify({c:store.bank.connected, n:store.bank.bankName, b:store.bank.balance});
  if(_prevSnap['bank'] !== bs){ store.bank.updatedAt = now; _prevSnap['bank'] = bs; }
  const ss = JSON.stringify({n:store.settings.companyName, c:store.settings.currency, i:store.settings.invoice});
  if(_prevSnap['set'] !== ss){ store.settingsUpdatedAt = now; _prevSnap['set'] = ss; }
}
function markDeleted(id){
  if(!id) return;
  store.deleted = store.deleted || [];
  store.deleted.push({id, at:Date.now()});
  if(store.deleted.length > 800) store.deleted = store.deleted.slice(-800);
}
function save(fromSync){
  if(!fromSync) stampChanges();
  localStorage.setItem(DATA_KEY, JSON.stringify(store));
  if(!fromSync) scheduleAutoSync();
}

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){
  const c = store.settings.currency || '£';
  n = Number(n)||0;
  return c + n.toLocaleString(undefined,{maximumFractionDigits:0});
}
function fmtSigned(n){ return (n<0?'-':'+') + fmt(Math.abs(n)); }
function fdate(iso){ if(!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}); }
function monthKey(iso){ const d=new Date(iso); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(key){ const [y,m]=key.split('-'); return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'short'}); }
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show' + (isErr?' err':'');
  clearTimeout(t._h);
  t._h = setTimeout(()=>{ t.className=''; }, 3200);
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
}
function companyById(id){ return store.companies.find(c=>c.id===id); }
function contactById(id){ return store.contacts.find(c=>c.id===id); }
function dealById(id){ return store.deals.find(d=>d.id===id); }
function orderById(id){ return store.orders.find(o=>o.id===id); }
function invoiceById(id){ return store.invoices.find(i=>i.id===id); }
function invoiceForOrder(orderId){ return store.invoices.find(i=>i.orderId===orderId); }
function orderTotal(o){ return (o.items||[]).reduce((s,l)=>s + (l.qty*(l.unitPrice||0)), 0); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDaysISO(dateStr, days){ const d = new Date(dateStr); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function fmtMoney(n){ const c = store.settings.currency||'£'; n = Number(n)||0;
  return c + n.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }
function invStatus(inv){
  if(inv.paidAt) return {txt:'Paid', cls:'green'};
  if(inv.sentAt) return (inv.dueDate && inv.dueDate < todayISO()) ? {txt:'Overdue', cls:'red'} : {txt:'Sent', cls:'blue'};
  if(inv.remindAt) return {txt:'Reminder set', cls:'amber'};
  return {txt:'Not sent', cls:'grey'};
}
function dueReminders(){
  return store.invoices.filter(i=>!i.sentAt && !i.paidAt && i.remindAt && new Date(i.remindAt) <= new Date());
}
function billingEmailFor(order){
  if(order.contactId){ const c = contactById(order.contactId); if(c && c.email) return c.email; }
  const c2 = store.contacts.find(x=>x.companyId===order.companyId && x.email);
  return c2 ? c2.email : '';
}
function contactName(c){ return c ? (c.firstName+' '+(c.lastName||'')).trim() : '—'; }

async function sha256(text){
  if(window.crypto && crypto.subtle){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // fallback (non-crypto env): simple hash
  let h = 0; for(let i=0;i<text.length;i++){ h = Math.imul(31,h) + text.charCodeAt(i) | 0; }
  return 'fb'+h.toString(16);
}

/* =====================================================================
   SYNC — shared data in a private GitHub repo (contents API), lodge-style:
   newest-updatedAt-wins per record, tombstones stop deletions resurrecting.
   ===================================================================== */
function b64encode(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64decode(s){ return decodeURIComponent(escape(atob(String(s).replace(/\n/g,'')))); }
function syncToken(){ return localStorage.getItem(SYNC_TOKEN_KEY) || ''; }

let syncCfg = null;   // optional sync-config.json (encrypted token, unlocked by passphrase)
async function loadSyncCfg(){
  try{ syncCfg = await (await fetch('./sync-config.json?v='+Date.now())).json(); }
  catch(e){ syncCfg = {configured:false}; }
}
async function decryptSyncToken(passphrase){
  if(!syncCfg || !syncCfg.configured) return null;
  try{
    const enc = new TextEncoder();
    const salt = Uint8Array.from(atob(syncCfg.salt), c=>c.charCodeAt(0));
    const iv   = Uint8Array.from(atob(syncCfg.iv),   c=>c.charCodeAt(0));
    const ct   = Uint8Array.from(atob(syncCfg.ct),   c=>c.charCodeAt(0));
    const base = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
    const key  = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
                   base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return new TextDecoder().decode(pt);
  }catch(e){ return null; }
}

function ghHeaders(){ return {'Authorization':'token '+syncToken(), 'Accept':'application/vnd.github+json'}; }
async function ghGet(path){
  const r = await fetch(DATA_API+path+'?ref=main&t='+Date.now(), {headers:ghHeaders(), cache:'no-store'});
  if(r.status===404) return null;
  if(r.status===401 || r.status===403) throw new Error('sync token was rejected — check it in Settings');
  if(!r.ok) throw new Error('GitHub read failed ('+r.status+')');
  return r.json();
}
async function ghPut(path, contentB64, message, sha){
  const body = {message, content:contentB64, branch:'main'};
  if(sha) body.sha = sha;
  const r = await fetch(DATA_API+path, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
  if(!r.ok) throw new Error('GitHub write failed ('+r.status+')');
  return r.json();
}

/* ---- merge: newest updatedAt wins per record; tombstones filter deletions ---- */
function mergeById(a, b, keyFn){
  keyFn = keyFn || (x=>x.id);
  const map = new Map();
  (a||[]).forEach(x=>map.set(keyFn(x), x));
  (b||[]).forEach(x=>{ const k=keyFn(x), cur=map.get(k);
    if(!cur || (x.updatedAt||0) > (cur.updatedAt||0)) map.set(k, x); });
  return [...map.values()];
}
function txKey(t){ return t.id || ((t.date||'')+'|'+(t.desc||'')+'|'+t.amount); }
function buildPayload(){
  return {
    contacts:store.contacts, companies:store.companies, deals:store.deals,
    orders:store.orders, invoices:store.invoices,
    stock:{items:store.stock.items, incoming:store.stock.incoming},
    bank:store.bank, counters:store.counters,
    settingsShared:{companyName:store.settings.companyName, currency:store.settings.currency, invoice:store.settings.invoice},
    settingsUpdatedAt:store.settingsUpdatedAt||0,
    push:store.push||[], deleted:store.deleted||[]
  };
}
function mergePayloads(r, l){
  if(!r) return l;
  const delMap = new Map();
  (r.deleted||[]).concat(l.deleted||[]).forEach(d=>delMap.set(d.id, d));
  const del = [...delMap.values()].sort((a,b)=>a.at-b.at).slice(-800);
  const delSet = new Set(del.map(d=>d.id));
  const alive = arr => (arr||[]).filter(x=>!delSet.has(x.id));
  const out = {};
  out.contacts  = alive(mergeById(r.contacts,  l.contacts));
  out.companies = alive(mergeById(r.companies, l.companies));
  out.deals     = alive(mergeById(r.deals,     l.deals));
  out.orders    = alive(mergeById(r.orders,    l.orders));
  out.invoices  = alive(mergeById(r.invoices,  l.invoices));
  out.stock = {
    items:    alive(mergeById((r.stock||{}).items,    (l.stock||{}).items)),
    incoming: alive(mergeById((r.stock||{}).incoming, (l.stock||{}).incoming))
  };
  const rb = r.bank||{}, lb = l.bank||{};
  const bankScal = (rb.updatedAt||0) >= (lb.updatedAt||0) ? rb : lb;
  out.bank = {...bankScal,
    transactions: mergeById(rb.transactions, lb.transactions, txKey)
      .filter(t=>!delSet.has(txKey(t)))
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''))};
  out.counters = {invoice: Math.max((r.counters||{}).invoice||0, (l.counters||{}).invoice||0)};
  if((r.settingsUpdatedAt||0) >= (l.settingsUpdatedAt||0)){
    out.settingsShared = r.settingsShared || l.settingsShared; out.settingsUpdatedAt = r.settingsUpdatedAt||0;
  } else { out.settingsShared = l.settingsShared; out.settingsUpdatedAt = l.settingsUpdatedAt||0; }
  out.push = mergeById(r.push, l.push);
  out.deleted = del;
  return out;
}
function applyPayload(p){
  store.contacts = p.contacts||[]; store.companies = p.companies||[]; store.deals = p.deals||[];
  store.orders = p.orders||[]; store.invoices = p.invoices||[];
  store.stock = {items:(p.stock||{}).items||[], incoming:(p.stock||{}).incoming||[]};
  store.bank = {...freshData().bank, ...(p.bank||{})};
  store.counters = {...store.counters, ...(p.counters||{})};
  const ss = p.settingsShared||{};
  store.settings = {...store.settings,
    companyName:ss.companyName||store.settings.companyName,
    currency:ss.currency||store.settings.currency,
    invoice:{...store.settings.invoice, ...(ss.invoice||{})}};
  store.settingsUpdatedAt = p.settingsUpdatedAt||0;
  store.push = p.push||[]; store.deleted = p.deleted||[];
  primeSnapshots();   // merge results must not be re-stamped as local edits
}

/* which record ids should wake the push sender ([notify] commit flag) */
function notifyIds(p){
  const ids = new Set(); if(!p) return ids;
  (p.orders||[]).forEach(o=>ids.add('o'+o.id));
  (p.invoices||[]).forEach(i=>ids.add('i'+i.id));
  (p.deals||[]).forEach(d=>{ if(d.status==='won') ids.add('w'+d.id); });
  return ids;
}
function hasNewNotifiable(remote, merged){
  const before = notifyIds(remote);
  for(const id of notifyIds(merged)) if(!before.has(id)) return true;
  return false;
}

let syncing = false, _syncQueued = null;
function scheduleAutoSync(){
  if(!syncToken() || syncing) return;
  clearTimeout(_syncQueued);
  _syncQueued = setTimeout(()=>doSync(true), 8000);   // push changes shortly after you stop editing
}
async function doSync(silent){
  if(syncing) return;
  if(!syncToken()){
    if(silent !== true) toast('Sync isn\'t connected on this device yet — see Settings → Sync.', true);
    return;
  }
  syncing = true; updateSyncUi(true);
  try{
    const file = await ghGet('data.json');
    let remote = null;
    if(file){ try{ remote = JSON.parse(b64decode(file.content)); }catch(e){} }
    const merged = mergePayloads(remote, buildPayload());
    const mergedText = JSON.stringify(merged);
    if(mergedText !== (remote ? JSON.stringify(remote) : null)){
      const flag = hasNewNotifiable(remote, merged) ? ' [notify]' : '';
      await ghPut('data.json', b64encode(mergedText), 'CRM sync'+flag, file ? file.sha : undefined);
    }
    applyPayload(merged); save(true);
    localStorage.setItem(LAST_SYNC_KEY, String(Date.now()));
    if(silent !== true) toast('Synced — this device now has the latest data.');
  }catch(e){
    if(silent !== true) toast('Sync failed: '+e.message+'. Check your connection and try again.', true);
  }finally{
    syncing = false; updateSyncUi(false);
    // refresh the screen unless the user is mid-modal
    const appEl = document.querySelector('#app');
    if(appEl && !appEl.classList.contains('hidden') && !document.querySelector('#modalRoot').innerHTML){
      App.go(App.view, App.param);
    }
  }
}
function updateSyncUi(busy){
  const b = document.querySelector('#syncbtn');
  if(b){ b.disabled = busy; b.innerHTML = busy ? '<span class="ico">&#8987;</span> Syncing…' : '<span class="ico">&#10227;</span> Sync now'; }
  const s = document.querySelector('#syncstatus');
  if(s) s.textContent = lastSyncText();
}
function lastSyncText(){
  if(!syncToken()) return 'Sync not connected';
  const t = Number(localStorage.getItem(LAST_SYNC_KEY)||0);
  if(!t) return 'Not synced yet';
  const d = new Date(t), today = new Date();
  return 'Synced '+(d.toDateString()===today.toDateString()
    ? d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
    : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
}
function autoSync(){
  if(Date.now() - Number(localStorage.getItem(LAST_SYNC_KEY)||0) < 60000) return;  // min 60s apart
  doSync(true);
}

function getAuth(){ try{ return JSON.parse(localStorage.getItem(AUTH_KEY)||'null'); }catch(e){ return null; } }
function setAuth(a){ localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }

function isUnlocked(){
  const a = getAuth();
  if(!a || !a.enabled) return true;
  if(sessionStorage.getItem(SESSION_KEY)==='1') return true;
  try{
    const r = JSON.parse(localStorage.getItem(REMEMBER_KEY)||'null');
    if(r && r.until > Date.now()) return true;
  }catch(e){}
  return false;
}

      const qty = Number(r.querySelector('.ol-qty').value)||0;

      if(itemId && qty>0) items.push({itemId, qty, unitPrice});

    if(!items.length){ toast('Add at least one order line with a quantity.', true); return; }

      orderDate:$('#of_date').value||todayISO(), deliveryDate:$('#of_delivery').value||null, items };

      const o = orderById(id);
      Object.assign(o, data);
      const inv = invoiceForOrder(id);
      if(inv && !inv.paidAt) inv.amount = orderTotal(o);
      save(); this.closeModal(); this.go(this.view, this.param); toast('Order updated.');
    } else {
      const o = {id:uid(), createdAt:new Date().toISOString(), status:'confirmed', ...data};

    store.orders = store.orders.filter(o=>o.id!==id);
    store.invoices = store.invoices.filter(i=>i.orderId!==id);
    save(); this.closeModal(); this.go('orders'); toast('Order deleted.');

  fulfillOrder(id){

    o.items.forEach(l=>{ const it = stockItemById(l.itemId); if(it) it.onHand -= l.qty; });
    o.status='fulfilled'; o.fulfilledAt = new Date().toISOString();
    save(); this.go(this.view, this.param); toast('Order fulfilled — stock deducted.');

  createInvoice(orderId, opts){
    opts = opts||{};

    if(existing) return existing;
    store.counters.invoice = (store.counters.invoice||0) + 1;

      issueDate:todayISO(), dueDate:addDaysISO(todayISO(), terms), amount:orderTotal(o),

  printInvoice(){

  sendInvoiceEmail(id){
    const inv = invoiceById(id); if(!inv) return;
    const o = orderById(inv.orderId);
    const to = o ? billingEmailFor(o) : '';
    const biz = store.settings.invoice||{};
    const bizName = biz.businessName || store.settings.companyName || 'Lakhani Foods Ltd';
    const subject = encodeURIComponent('Invoice '+inv.number+' from '+bizName+' — '+fmtMoney(inv.amount));
    const body = encodeURIComponent(this.invoiceText(inv) +
      '\n\n(For a formatted copy, a PDF version of this invoice is attached / available on request.)');
    window.location.href = 'mailto:'+encodeURIComponent(to)+'?subject='+subject+'&body='+body;
    setTimeout(()=>{
      if(confirm('Your email app should have opened with the invoice pre-filled'+(to?' to '+to:'')+'.\n\nTip: use Print → Save as PDF to attach a formatted copy.\n\nMark '+inv.number+' as SENT?')){

  copyInvoiceText(id){

      navigator.clipboard.writeText(txt).then(()=>toast('Invoice copied — paste it into an email or document.'));

  markInvoiceSent(id){

  /* =============== SYNC & NOTIFICATIONS =============== */
  saveSyncToken(){
    const t = $('#sy_token').value.trim();
    if(!t){ toast('Paste the sync token first.', true); return; }
    localStorage.setItem(SYNC_TOKEN_KEY, t);
    this.go('settings'); toast('Sync connected — running first sync…');
    doSync(true);
  },
  async unlockSync(){
    const pass = $('#sy_pass').value;
    if(!pass){ toast('Enter the sync passphrase.', true); return; }
    const tok = await decryptSyncToken(pass);
    if(!tok){ toast('That passphrase is not right — try again.', true); return; }
    localStorage.setItem(SYNC_TOKEN_KEY, tok);
    this.go('settings'); toast('Sync unlocked on this device — running first sync…');
    doSync(true);
  },
  disconnectSync(){
    if(!confirm('Disconnect sync on this device? Data stays here but stops updating between devices.')) return;
    localStorage.removeItem(SYNC_TOKEN_KEY);
    localStorage.removeItem(LAST_SYNC_KEY);
    this.go('settings'); updateSyncUi(false); toast('Sync disconnected on this device.');
  },
  async enablePush(){
    try{
      if(!('Notification' in window) || !('PushManager' in window)){
        toast('Push isn\'t supported in this browser. On iPhone, install the app to your Home Screen first.', true); return;
      }
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ this.go('settings'); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({userVisibleOnly:true,
        applicationServerKey:(b64=>{const pad='='.repeat((4-b64.length%4)%4);
          const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
          return Uint8Array.from(raw, c=>c.charCodeAt(0));})(VAPID_PUBLIC)});
      let did = localStorage.getItem(DEVICE_KEY);
      if(!did){ did = uid(); localStorage.setItem(DEVICE_KEY, did); }
      store.push = store.push||[];

  async generateLeads(){
    const desc = $('#lg_desc').value.trim();
    if(!desc){ toast('Describe your target client base first.', true); return; }
    const keyInput = $('#lg_key');
    if(keyInput && keyInput.value.trim()){ store.settings.apiKey = keyInput.value.trim(); save(); }
    if(!store.settings.apiKey){ toast('An Anthropic API key is needed to ask Claude.', true); return; }

    const region = $('#lg_region').value.trim() || 'United Kingdom';
    const count = Number($('#lg_count').value)||5;
    const typical = Number($('#lg_value').value)||10000;
    const btn = $('#lg_go');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Asking Claude…';
    $('#lg_results').innerHTML = '';

    const schema = {
      type:'object',
      properties:{
        leads:{ type:'array', items:{
          type:'object',
          properties:{
            companyName:{type:'string'},
            industry:{type:'string'},
            location:{type:'string'},
            contactName:{type:'string', description:'A plausible full name for the likely buyer persona'},
            contactRole:{type:'string', description:'Job title of the likely buyer, e.g. Head of Procurement'},
            estimatedValue:{type:'number', description:'Estimated first-deal value'},
            rationale:{type:'string', description:'One sentence on why this prospect fits'}
          },
          required:['companyName','industry','location','contactName','contactRole','estimatedValue','rationale'],
          additionalProperties:false
        }}
      },
      required:['leads'], additionalProperties:false
    };

    const prompt =
`You are a B2B sales researcher for ${store.settings.companyName||'Lakhani Foods Ltd'}, a food products company.

Suggest exactly ${count} realistic prospect leads matching this ideal client profile:
"${desc}"

Region / market: ${region}
Typical first-deal value: around ${store.settings.currency}${typical} (vary it plausibly per lead, from roughly half to double).

For each lead give: a realistic company profile of the kind that exists in this market (a plausible company name and location — these are illustrative prospect archetypes for the user to research and verify), the likely buyer persona (a plausible contact name and job title), an estimated first-deal value as a plain number, and a one-sentence rationale for the fit.`;

    try{
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': store.settings.apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({
          model:'claude-opus-4-8',
          max_tokens:8000,
          output_config:{format:{type:'json_schema', schema}},
          messages:[{role:'user', content:prompt}]
        })
      });
      const body = await res.json();
      if(!res.ok){
        const msg = (body && body.error && body.error.message) || ('HTTP '+res.status);
        throw new Error(msg);
      }
      if(body.stop_reason === 'refusal'){ throw new Error('Claude declined this request. Try rewording your description.'); }
      const textBlock = (body.content||[]).find(b=>b.type==='text');
      const parsed = JSON.parse(textBlock.text);
      this._aiLeads = parsed.leads || [];
      this.renderAiResults();
    }catch(err){
      $('#lg_results').innerHTML = `<div class="banner" style="background:var(--red-soft);border-color:#e6b8b2;color:var(--red)">
        <b>Couldn't generate leads:</b> ${esc(err.message)}</div>`;
    }finally{
      btn.disabled = false; btn.textContent = 'Generate leads';
    }
  },

  renderAiResults(){
    const leads = this._aiLeads || [];
    if(!leads.length){ $('#lg_results').innerHTML = '<div class="banner">Claude returned no leads — try a more specific description.</div>'; return; }
    $('#lg_results').innerHTML = `
      <div style="margin:14px 0 8px;font-weight:600;font-family:'Segoe UI',sans-serif;font-size:13.5px">
        Claude suggested ${leads.length} lead${leads.length>1?'s':''} — untick any you don't want:</div>

/* ---------------- Stock helpers ---------------- */
function stockItemById(id){ return store.stock.items.find(i=>i.id===id); }
/* A deal's stock demand: exact lines if set, otherwise the company's estimated requirement */
function effectiveLines(deal){
  if(deal.stockLines && deal.stockLines.length) return {lines:deal.stockLines, estimated:false};
  if(deal.companyId){
    const co = companyById(deal.companyId);
    if(co && co.stockEstimates && co.stockEstimates.length) return {lines:co.stockEstimates, estimated:true};
  }
  return {lines:[], estimated:false};
}
function dealQtyFor(deal, itemId){ return effectiveLines(deal).lines.filter(l=>l.itemId===itemId).reduce((s,l)=>s+l.qty,0); }
function stockStats(item){
  const wonDeals  = store.deals.filter(d=>d.status==='won' && !d.fulfilled);
  const openDeals = store.deals.filter(d=>d.status==='open');
  const committed  = wonDeals.reduce((s,d)=>s+dealQtyFor(d,item.id),0);
  const openDemand = openDeals.reduce((s,d)=>s+dealQtyFor(d,item.id),0);
  const weightedDemand = openDeals.reduce((s,d)=>s+dealQtyFor(d,item.id)*(STAGE_PROB[d.stage]||0.1),0);
  const pending  = store.stock.incoming.filter(o=>o.itemId===item.id && !o.received)
                    .sort((a,b)=>(a.expectedDate||'').localeCompare(b.expectedDate||''));
  const incoming = pending.reduce((s,o)=>s+o.qty,0);
  const availableNow = item.onHand - committed;               // free stock after won-but-undelivered deals
  const projectedAll = item.onHand + incoming - committed - openDemand; // if every open deal closes
  return {committed, openDemand, weightedDemand, incoming, availableNow, projectedAll, pending};
}
function stockStatus(st){
  if(st.availableNow < 0) return {cls:'red', txt:'Oversold'};
  if(st.projectedAll < 0) return {cls:'red', txt:'Shortfall'};
  if(st.openDemand > 0 && st.availableNow < st.openDemand) return {cls:'amber', txt:'Needs deliveries'};
  return {cls:'green', txt:'OK'};
}
function dealLineRowHtml(l){
  const opts = store.stock.items.map(it=>`<option value="${it.id}" ${l&&l.itemId===it.id?'selected':''}>${esc(it.name)} (${esc(it.unit)})</option>`).join('');

    <select class="dl-item" style="flex:1">${opts}</select>

    <button type="button" class="btn small danger" onclick="this.parentElement.remove()">&times;</button></div>`;
}
function orderLineRowHtml(l){

    <button type="button" class="btn small danger" onclick="this.parentElement.remove()">&times;</button></div>`;

function statPack(){
  const open = store.deals.filter(d=>d.status==='open');
  const won  = store.deals.filter(d=>d.status==='won');
  const lost = store.deals.filter(d=>d.status==='lost');
  const pipelineValue = open.reduce((s,d)=>s+d.value,0);
  const weighted = open.reduce((s,d)=>s+d.value*(STAGE_PROB[d.stage]||0.1),0);
  const wonValue = won.reduce((s,d)=>s+d.value,0);
  const winRate = (won.length+lost.length) ? Math.round(100*won.length/(won.length+lost.length)) : null;
  return {open, won, lost, pipelineValue, weighted, wonValue, winRate};
}

/* ---------------- Pipeline ---------------- */
function renderPipeline(){
  const cols = STAGES.map(stage=>{
    const deals = store.deals.filter(d=>{
      if(d.status==='lost') return false;
      if(stage==='Closed Won') return d.stage==='Closed Won' && d.status==='won';
      return d.stage===stage && d.status==='open';
    });
    const total = deals.reduce((s,d)=>s+d.value,0);
    return `
    <div class="col" data-stage="${esc(stage)}">
      <div class="col-head"><span class="t">${esc(stage)}</span><span class="n">${deals.length}</span></div>
      <div class="col-sum">${fmt(total)} · ${Math.round((STAGE_PROB[stage]||0)*100)}% likely</div>
      ${deals.map(d=>{
        const comp = d.companyId ? companyById(d.companyId) : null;
        return `<div class="deal" draggable="true" data-id="${d.id}" onclick="App.go('deal','${d.id}')">
          <div class="dn">${esc(d.name)}</div>
          <div class="dc">${comp?esc(comp.name):'No company'}</div>
          <div class="dv">${fmt(d.value)}</div>
          <div class="tags">${d.source==='claude'?'<span class="pill amber">AI suggested</span> ':''}${d.status==='won'?'<span class="pill green">Won</span>':''}</div>
        </div>`;
      }).join('') || '<div style="color:#a9a48f;font-size:12.5px;font-family:sans-serif;padding:8px 2px">Drop leads here</div>'}
    </div>`;
  }).join('');

  const lost = store.deals.filter(d=>d.status==='lost');

  return `
  <div class="page-head">
    <div><h2>Lead pipeline</h2>
    <div class="sub">Drag leads between stages. Dropping into <b>Closed Won</b> marks the deal as won.</div></div>
    <div style="display:flex;gap:10px">
      <button class="btn amber" onclick="App.openLeadGen()">&#10024; Ask Claude to generate leads</button>
      <button class="btn" onclick="App.openDealForm()">+ New lead</button>
    </div>
  </div>
  <div class="board">${cols}</div>
  ${lost.length? `<div class="card" style="margin-top:18px">
    <div class="chart-title">Lost deals (${lost.length})</div>
    <table><thead><tr><th>Deal</th><th>Company</th><th>Value</th><th>Lost on</th><th></th></tr></thead><tbody>
    ${lost.map(d=>`<tr class="clickable" onclick="App.go('deal','${d.id}')">
      <td>${esc(d.name)}</td><td>${d.companyId?esc((companyById(d.companyId)||{}).name||'—'):'—'}</td>
      <td>${fmt(d.value)}</td><td>${fdate(d.closedAt)}</td>
      <td><button class="btn small ghost" onclick="event.stopPropagation();App.reopenDeal('${d.id}')">Reopen</button></td></tr>`).join('')}
    </tbody></table></div>`:''}
  `;
}

function wireDragDrop(){
  document.querySelectorAll('.deal[draggable]').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', el.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', ()=> col.classList.remove('drag-over'));
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      if(id) App.moveDeal(id, col.dataset.stage);
    });
  });
}

function parseCsvTransactions(text){
  const out = [];
  text.split(/\r?\n/).forEach(line=>{
    if(!line.trim()) return;
    const parts = line.split(',').map(p=>p.trim().replace(/^"|"$/g,''));
    if(parts.length < 3) return;
    const amount = Number(parts[parts.length-1].replace(/[£$€,\s]/g,''));
    if(isNaN(amount)) return; // header row or bad line
    const dateRaw = parts[0];
    const d = new Date(dateRaw);
    const date = isNaN(d.getTime()) ? null : d.toISOString();
    out.push({id:uid(), date, desc: parts.slice(1,-1).join(', ') || 'Transaction', amount});
  });
  return out.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
}

  const outstandingTotal = outstanding.reduce((s,i)=>s+i.amount,0);

          <p style="font-family:'Segoe UI',sans-serif;font-size:13.5px;color:var(--green-dark)"><b>&#10003; Sync is active on this device.</b> ${lastSyncText()}.</p>
          <div style="display:flex;gap:9px;margin-top:10px">
            <button class="btn" onclick="doSync()">Sync now</button>
            <button class="btn ghost" onclick="App.disconnectSync()">Disconnect this device</button>
          </div>`;
        if(syncCfg && syncCfg.configured) return `
          <div class="frow"><label>Sync passphrase</label>
            <input type="password" id="sy_pass" placeholder="Enter the sync passphrase" onkeydown="if(event.key==='Enter')App.unlockSync()">
            <div class="hint">One-time step on each device — unlocks the encrypted sync key built into the app.</div></div>
          <button class="btn" onclick="App.unlockSync()">Unlock sync</button>`;
        return `
          <div class="frow"><label>Sync token</label>
            <input type="password" id="sy_token" placeholder="github_pat_…">
            <div class="hint">A GitHub fine-grained token for the private data store (repo <b>lakhani-foods-data</b>,
            Contents read &amp; write). Paste it once on each device.</div></div>
          <button class="btn" onclick="App.saveSyncToken()">Connect sync</button>`;
      })()}
    </div>

    <div class="card">
      <div class="section-title">Device notifications</div>
      <p style="font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--muted);margin-bottom:12px">
        Get a pop-up on this device — even with the app closed — for new orders, won deals and
        invoice reminders that are due.</p>
      ${(()=>{
        if(!('Notification' in window) || !('PushManager' in window))
          return '<p style="font-family:sans-serif;font-size:12.5px;color:var(--muted)">Not supported in this browser. On iPhone: install the app to your Home Screen first (Share &rarr; Add to Home Screen), then enable this inside the installed app.</p>';
        const did = localStorage.getItem(DEVICE_KEY);
        const registered = did && (store.push||[]).some(x=>x.id===did);
        if(Notification.permission==='granted' && registered)
          return '<p style="font-family:sans-serif;font-size:13.5px;color:var(--green-dark)"><b>&#10003; Enabled on this device.</b></p>';
        if(Notification.permission==='denied')
          return '<p style="font-family:sans-serif;font-size:12.5px;color:var(--muted)">Blocked in your browser settings — allow notifications for this site, then come back here.</p>';
        return '<button class="btn" onclick="App.enablePush()">Enable on this device</button>';
      })()}
    </div>

    <div class="card" style="grid-column:1/-1">
      <div class="section-title">Invoice details</div>
      <p style="font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--muted);margin-bottom:12px">
        These appear on every invoice you create. Fill them in when ready — invoices work without them but look better complete.</p>
      ${(()=>{const iv = store.settings.invoice||{}; return `
      <div class="f2">
        <div class="frow"><label>Business name (on invoices)</label><input id="iv_bizname" placeholder="${esc(store.settings.companyName)}" value="${esc(iv.businessName)}"></div>
        <div class="frow"><label>Invoice email (your sending address)</label><input id="iv_email" placeholder="e.g. accounts@lakhanifoods.co.uk" value="${esc(iv.email)}"></div>
      </div>
      <div class="f2">
        <div class="frow"><label>Phone</label><input id="iv_phone" value="${esc(iv.phone)}"></div>
        <div class="frow"><label>VAT number</label><input id="iv_vat" value="${esc(iv.vatNo)}"></div>
      </div>
      <div class="f2">
        <div class="frow"><label>Business address</label><textarea id="iv_address" placeholder="Street&#10;City&#10;Postcode">${esc(iv.address)}</textarea></div>
        <div class="frow"><label>Payment / bank details</label><textarea id="iv_bank" placeholder="Account name&#10;Sort code · Account number">${esc(iv.bankDetails)}</textarea></div>
      </div>
      <div class="f2">
        <div class="frow"><label>Payment terms (days until due)</label><input id="iv_terms" type="number" min="0" value="${iv.termsDays!=null?iv.termsDays:30}"></div>
        <div class="frow"><label>Invoice footer note</label><input id="iv_footer" value="${esc(iv.footer)}"></div>
      </div>
      <button class="btn" onclick="App.saveInvoiceSettings()">Save invoice details</button>`;})()}
    </div>

    <div class="card">
      <div class="section-title">Data</div>
      <p style="font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--muted);margin-bottom:12px">
        All CRM data lives in this browser. Export a backup regularly.</p>
      <div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center">
        <button class="btn" onclick="App.exportData()">Export backup (JSON)</button>
        <input type="file" id="st_import" accept=".json" style="font-size:12px">
        <button class="btn ghost" onclick="App.importData()">Restore</button>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
      <button class="btn danger" onclick="App.clearAll()">Delete all data</button>
    </div>
  </div>`;
}

/* =====================================================================
   SVG CHART HELPERS (no external libraries)
   ===================================================================== */
function svgBars(items, color, money){
  if(!items.length) return '<div style="color:var(--muted);font-size:13px;font-family:sans-serif">No data yet.</div>';
  const W=480, H=190, pad=26, bw = (W-pad*2)/items.length;
  const max = Math.max(1, ...items.map(i=>Math.abs(i.value)));
  const zero = H-38; // baseline
  const scale = (zero-14)/max;
  let bars='';
  items.forEach((it,i)=>{
    const h = Math.abs(it.value)*scale;
    const x = pad + i*bw + bw*0.15, w = bw*0.7;
    const y = it.value>=0 ? zero-h : zero;
    bars += `<rect x="${x}" y="${y}" width="${w}" height="${Math.max(h,it.value===0?0:2)}" rx="4" fill="${it.value<0?'#b03a2e':color}"/>`;
    bars += `<text x="${x+w/2}" y="${H-20}" font-size="10.5" text-anchor="middle" fill="#6b7a70" font-family="Segoe UI">${esc(String(it.label).slice(0,11))}</text>`;
    if(it.value!==0) bars += `<text x="${x+w/2}" y="${(it.value>=0? y-5 : zero+h+12)}" font-size="10" text-anchor="middle" fill="#1e2a23" font-family="Segoe UI">${money?fmt(it.value):it.value}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%"><line x1="${pad}" y1="${zero}" x2="${W-pad}" y2="${zero}" stroke="#e2ded2"/>${bars}</svg>`;
}
function svgHBars(items){
  if(!items.length) return '';
  const W=900, rowH=34, H=items.length*rowH+10;
  const max = Math.max(1, ...items.map(i=>i.value));
  let rows='';
  items.forEach((it,i)=>{
    const y = 8+i*rowH;
    const w = Math.max(4,(it.value/max)*(W-330));
    rows += `<text x="0" y="${y+15}" font-size="12.5" fill="#1e2a23" font-family="Segoe UI">${esc(String(it.label).slice(0,34))}</text>
      <rect x="250" y="${y+2}" width="${w}" height="18" rx="5" fill="#1e5c40"/>
      <text x="${255+w}" y="${y+16}" font-size="12" fill="#6b7a70" font-family="Segoe UI">${fmt(it.value)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${rows}</svg>`;
}
function svgLine(items, color){
  if(!items.length) return '<div style="color:var(--muted);font-size:13px;font-family:sans-serif">No data yet.</div>';
  const W=480, H=190, pad=28;
  const max = Math.max(1, ...items.map(i=>i.value));
  const stepX = (W-pad*2)/Math.max(1,items.length-1);
  const y = v => (H-38) - (v/max)*(H-64);
  const pts = items.map((it,i)=> (pad+i*stepX)+','+y(it.value)).join(' ');
  let dots='', labels='';
  items.forEach((it,i)=>{
    const px = pad+i*stepX;
    dots += `<circle cx="${px}" cy="${y(it.value)}" r="4" fill="${color}"/>
      <text x="${px}" y="${y(it.value)-9}" font-size="10.5" text-anchor="middle" fill="#1e2a23" font-family="Segoe UI">${it.value||''}</text>`;
    labels += `<text x="${px}" y="${H-20}" font-size="10.5" text-anchor="middle" fill="#6b7a70" font-family="Segoe UI">${esc(it.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    <line x1="${pad}" y1="${H-38}" x2="${W-pad}" y2="${H-38}" stroke="#e2ded2"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${labels}</svg>`;
}
function svgDonut(segments){
  const total = segments.reduce((s,x)=>s+x.value,0);
  if(!total) return '<div style="color:var(--muted);font-size:13px;font-family:sans-serif">No data yet.</div>';
  const R=62, C=2*Math.PI*R;
  let off=0, circles='';
  segments.forEach(seg=>{
    if(!seg.value) return;
    const frac = seg.value/total;
    circles += `<circle r="${R}" cx="95" cy="95" fill="none" stroke="${seg.color}" stroke-width="26"
      stroke-dasharray="${frac*C} ${C}" stroke-dashoffset="${-off*C}" transform="rotate(-90 95 95)"/>`;
    off += frac;
  });
  const legend = segments.map(s=>`<span><span class="sw" style="background:${s.color}"></span>${esc(s.label)} (${s.value})</span>`).join('');
  return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <svg viewBox="0 0 190 190" style="width:170px">${circles}
      <text x="95" y="90" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e2a23" font-family="Georgia">${total}</text>
      <text x="95" y="110" text-anchor="middle" font-size="11" fill="#6b7a70" font-family="Segoe UI">deals</text></svg>
    <div class="legend" style="flex-direction:column;align-items:flex-start;gap:8px">${legend}</div></div>`;
}

/* =====================================================================
   BOOT
   ===================================================================== */
primeSnapshots();          // baseline for change-stamping — must run before any save()
loadSyncCfg();             // picks up sync-config.json if published

if(getAuth() === null){ showLock(); }        // first run — offer password setup
else if(isUnlocked()){ showApp(); }
else { showLock(); }

// PWA: register service worker so the app installs on the desktop and works offline
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Auto-sync: on open, when you come back to the app, when you come online,
// and every 3 minutes while open (never more than once a minute).
if(syncToken()) setTimeout(()=>doSync(true), 800);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') autoSync(); });
window.addEventListener('online', autoSync);
setInterval(()=>{ if(document.visibilityState==='visible') autoSync(); }, 3*60*1000);
updateSyncUi(false);
</script>
